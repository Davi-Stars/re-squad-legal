<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Re:Squad — Documentos legais</title>
<style>
  :root{ --ink:#1c2029; --muted:#5c6472; --line:#e6e8ee; --accent:#4b6ee1; --bg:#fbfcfe; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6; }
  .wrap{ max-width:620px; margin:0 auto; padding:70px 22px; }
  .brand{ font-weight:700; font-size:15px; letter-spacing:.2px; color:var(--accent); }
  h1{ font-size:30px; margin:10px 0 6px; letter-spacing:-.3px; }
  p{ color:var(--muted); font-size:16px; margin:0 0 26px; }
  .cards{ display:grid; gap:14px; }
  a.card{ display:block; text-decoration:none; color:var(--ink);
    border:1px solid var(--line); border-radius:12px; padding:18px 20px; background:#fff;
    transition:border-color .15s; }
  a.card:hover{ border-color:var(--accent); }
  a.card strong{ font-size:17px; }
  a.card span{ display:block; color:var(--muted); font-size:14px; margin-top:3px; }
  footer{ margin-top:34px; color:var(--muted); font-size:14px; }
  footer a{ color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Re:Squad</div>
  <h1>Documentos legais</h1>
  <p>Bot de Discord para RPG de mesa — rolagem de dados e fichas de personagem.</p>
  <div class="cards">
    <a class="card" href="termos.html"><strong>Termos de Serviço</strong><span>Regras de uso do bot.</span></a>
    <a class="card" href="privacidade.html"><strong>Política de Privacidade</strong><span>Quais dados o bot coleta e como removê-los.</span></a>
  </div>
  <footer>Contato: <a href="mailto:danielleywin040@gmail.com">danielleywin040@gmail.com</a></footer>
</div>
</body>
</html>
